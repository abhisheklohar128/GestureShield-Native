name: Build GestureShield APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup project structure
      run: |
        # Directories बनवा
        mkdir -p app/src/main/java/com/gestureshield
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/xml
        mkdir -p app/src/main/assets
        mkdir -p gradle/wrapper
        
        # Files move करा (जर अस्तित्वात असतील तर)
        [ -f AndroidManifest.xml ] && mv AndroidManifest.xml app/src/main/
        [ -f GestureService.kt ] && mv GestureService.kt app/src/main/java/com/gestureshield/
        [ -f MainActivity.kt ] && mv MainActivity.kt app/src/main/java/com/gestureshield/
        [ -f activity_main.xml ] && mv activity_main.xml app/src/main/res/layout/
        [ -f overlay_indicator.xml ] && mv overlay_indicator.xml app/src/main/res/layout/
        [ -f strings.xml ] && mv strings.xml app/src/main/res/values/
        [ -f themes.xml ] && mv themes.xml app/src/main/res/values/
        [ -f accessibility_service_config.xml ] && mv accessibility_service_config.xml app/src/main/res/xml/
        [ -f gradle-wrapper.properties ] && mv gradle-wrapper.properties gradle/wrapper/
        
        # Files list बघा
        echo "=== Root files ==="
        ls -la
        echo "=== App structure ==="
        find app -type f 2>/dev/null || echo "No app files yet"

    - name: Create settings.gradle
      run: |
        cat > settings.gradle << 'EOF'
        rootProject.name = "GestureShield"
        include ':app'
        EOF

    - name: Create root build.gradle
      run: |
        cat > build.gradle << 'EOF'
        buildscript {
            ext.kotlin_version = '1.9.0'
            repositories { 
                google() 
                mavenCentral() 
            }
            dependencies {
                classpath 'com.android.tools.build:gradle:8.1.0'
                classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
            }
        }
        allprojects { 
            repositories { 
                google() 
                mavenCentral() 
            } 
        }
        EOF

    - name: Create app/build.gradle
      run: |
        cat > app/build.gradle << 'EOF'
        plugins {
            id 'com.android.application'
            id 'kotlin-android'
        }
        android {
            compileSdk 34
            namespace 'com.gestureshield'
            defaultConfig {
                applicationId "com.gestureshield"
                minSdk 26
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
            buildTypes {
                release { 
                    minifyEnabled false 
                }
            }
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_1_8
                targetCompatibility JavaVersion.VERSION_1_8
            }
            kotlinOptions { 
                jvmTarget = '1.8' 
            }
        }
        dependencies {
            implementation 'androidx.core:core-ktx:1.12.0'
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.11.0'
            implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
            implementation 'com.google.mediapipe:tasks-vision:0.10.8'
            implementation 'androidx.camera:camera-core:1.3.1'
            implementation 'androidx.camera:camera-camera2:1.3.1'
            implementation 'androidx.camera:camera-lifecycle:1.3.1'
            implementation 'androidx.camera:camera-view:1.3.1'
        }
        EOF

    - name: Create gradle-wrapper.properties
      run: |
        cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-8.0-bin.zip
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        EOF

    - name: Download MediaPipe model
      run: |
        mkdir -p app/src/main/assets
        wget -q -O app/src/main/assets/hand_landmarker.task \
          "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task"

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build APK
      run: gradle assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: GestureShield-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
